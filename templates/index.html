<!DOCTYPE html>
<html>
<head>
<title>AI Resume Analyzer</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="box">
<h1>AI Resume Analyzer</h1>

<form method="POST">

<textarea name="resume" placeholder="Paste your resume text here..." required></textarea>

<button type="submit">Analyze Resume</button>

</form>

{% if result %}
<h2>Skills Found:</h2>
<p>{{ result }}</p>

<h2>ATS Score:</h2>
<p>{{ score }}/100</p>
{% endif %}

</div>

</body>
</html>
